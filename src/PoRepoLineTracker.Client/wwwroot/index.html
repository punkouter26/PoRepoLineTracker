<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PoRepoLineTracker</title>
    <base href="/" />
    <link id="radzen-theme" rel="stylesheet" href="_content/Radzen.Blazor/css/material-base.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="PoRepoLineTracker.Client.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_content/Radzen.Blazor/Radzen.Blazor.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        function clickGitHubButton() {
            const button = document.querySelector('button.btn-primary');
            if (button && button.textContent.includes('Select from GitHub')) {
                console.log('Attempting to click "Select from GitHub" button via JavaScript.');
                button.click();
            } else {
                console.log('Button "Select from GitHub" not found or text mismatch.');
            }
        }

        function setTheme(theme) {
            var link = document.getElementById('radzen-theme');
            if (link) {
                link.href = theme === 'dark'
                    ? '_content/Radzen.Blazor/css/material-dark.css'
                    : '_content/Radzen.Blazor/css/material-base.css';
            }
            localStorage.setItem('theme', theme);
            document.documentElement.setAttribute('data-theme', theme);
        }

        // Restore saved theme on load to prevent flash of wrong theme
        (function () {
            var saved = localStorage.getItem('theme');
            if (saved === 'dark') setTheme('dark');
        })();
    </script>
</body>

</html>
