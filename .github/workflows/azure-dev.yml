# Azure App Service deployment via Azure Developer CLI (azd)
# Triggered on push to master or manual dispatch
on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Log in with Azure (Federated Credentials)
        run: |
          azd auth login `
            --client-id "$Env:AZURE_CLIENT_ID" `
            --federated-credential-provider "github" `
            --tenant-id "$Env:AZURE_TENANT_ID"
        shell: pwsh

      - name: Provision Infrastructure (creates ACR, App Service, etc.)
        run: azd provision --no-prompt

      - name: Build and Push Docker Image to ACR
        # az acr build runs the Docker build in the cloud (no local Docker daemon needed).
        # The ACR name is derived from the uniqueString-generated name in resources.bicep.
        run: |
          $acrName = az acr list --resource-group PoRepoLineTracker --query "[0].name" -o tsv
          Write-Host "Building image in ACR: $acrName" -ForegroundColor Cyan
          az acr build `
            --registry $acrName `
            --image api:latest `
            --file src/PoRepoLineTracker.Api/Dockerfile `
            .
        shell: pwsh

      - name: Restart App Service to pull new image
        run: az webapp restart --name app-porepolinetracker --resource-group PoRepoLineTracker
        
