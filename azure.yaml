# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: PoRepoLineTracker
metadata:
  template: PoRepoLineTracker

infra:
  provider: bicep
  path: infra
  module: main

services:
  api:
    project: ./src/PoRepoLineTracker.Api
    language: dotnet
    host: appservice
    docker:
      path: ./Dockerfile        # relative to project path (src/PoRepoLineTracker.Api/Dockerfile)
      context: ../..            # relative to project path — repo root (contains solution + all src/)
